<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永年中學 學籍與名單管理系統</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 🌟 載入 FontAwesome 穩定圖示庫 (解決白畫面問題) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 載入 React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 載入 Firebase SDK (穩定版相容模式) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  
  <!-- 🌟 載入專業 Excel (.xlsx) 樣式產出套件 (徹底解決亂碼與格式問題) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-[#f8fafc] font-sans text-slate-800 antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // === 初始化 Firebase 資料庫 ===
    const firebaseConfig = {
      apiKey: "AIzaSyC5gnvuuFy7jhBcaeAGsRQ1EjaVshCQq3I",
      authDomain: "yung-nien-system.firebaseapp.com",
      projectId: "yung-nien-system",
      storageBucket: "yung-nien-system.firebasestorage.app",
      messagingSenderId: "29264956358",
      appId: "1:29264956358:web:2fbcc58ed5d89bde9000c7"
    };
    
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    function App() {
      // === 系統帳號狀態 ===
      const [appAccounts, setAppAccounts] = useState(() => {
        const savedAccounts = localStorage.getItem('yungNienAccounts');
        if (savedAccounts) {
          try { return JSON.parse(savedAccounts); } catch(e) {}
        }
        return {
          admin: { password: '123', role: 'admin', name: '註冊組長', department: '教務處 (管理員)' },
          academic: { password: '123', role: 'staff', name: '教務處行政', department: '教務處' },
          studentAffairs: { password: '123', role: 'staff', name: '學務處行政', department: '學務處' },
          counseling: { password: '123', role: 'staff', name: '輔導室行政', department: '輔導室' },
          generalAffairs: { password: '123', role: 'staff', name: '總務處行政', department: '總務處' }
        };
      });

      const [auth, setAuth] = useState({ loggedIn: false, username: '', role: '', name: '', department: '' });
      const [loginForm, setLoginForm] = useState({ username: 'admin', password: '' });

      // === 狀態與彈窗 ===
      const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
      const [passwordForm, setPasswordForm] = useState({ targetAccount: '', old: '', new: '', confirm: '' });
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
      const [undoAction, setUndoAction] = useState(null); 

      // 🌟 修正：將學期狀態綁定本地儲存，避免重整後幽靈學期跑出來
      const [semesters, setSemesters] = useState(() => {
        const saved = localStorage.getItem('yungNienSemesters');
        return saved ? JSON.parse(saved) : ['114-1', '113-2'];
      });
      const [activeSemester, setActiveSemester] = useState(semesters[0] || '114-1');
      
      const [activeTab, setActiveTab] = useState('classList');
      const [students, setStudents] = useState([]);
      const [logs, setLogs] = useState([]);
      const [isDataLoaded, setIsDataLoaded] = useState(false);

      const [filterGrade, setFilterGrade] = useState('國一');
      const [filterClass, setFilterClass] = useState('忠');
      const [manageFilterGrade, setManageFilterGrade] = useState('國一');
      const [manageFilterClass, setManageFilterClass] = useState('忠');
      const [searchTerm, setSearchTerm] = useState('');

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isImportModalOpen, setIsImportModalOpen] = useState(false);
      const [isNewSemesterModalOpen, setIsNewSemesterModalOpen] = useState(false);
      const [isEditSemesterModalOpen, setIsEditSemesterModalOpen] = useState(false);
      const [editingStudent, setEditingStudent] = useState(null);
      const [editSemesterName, setEditSemesterName] = useState('');
      
      const [formData, setFormData] = useState({ id: '', name: '', seatNumber: '1', gender: '男', grade: '國一', className: '忠', status: '在籍', transferDate: '', originalClassSeat: '' });
      const [newSemesterData, setNewSemesterData] = useState({ name: '', copyOldData: true, promoteGrade: false, jhClassAssignment: 'keep', shClassAssignment: 'keep' });

      const showAlert = (message, title = '系統提示') => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
      const showConfirm = (message, onConfirm, title = '系統確認') => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialog({ ...dialog, isOpen: false });

      // === 監聽 Firebase 與本地狀態儲存 ===
      useEffect(() => {
        const unsubscribeAccounts = db.collection("system").doc("accounts").onSnapshot((doc) => {
          if (doc.exists) {
            setAppAccounts(doc.data());
            localStorage.setItem('yungNienAccounts', JSON.stringify(doc.data()));
          } else {
            db.collection("system").doc("accounts").set(appAccounts);
          }
        });
        return () => unsubscribeAccounts();
      }, []);

      useEffect(() => {
        if (!auth.loggedIn) return;
        
        const unsubscribeStudents = db.collection("students").onSnapshot((snapshot) => {
          const studentData = [];
          snapshot.forEach((doc) => studentData.push({ ...doc.data(), docId: doc.id }));
          setStudents(studentData);
          setIsDataLoaded(true);
        });
        
        const unsubscribeLogs = db.collection("logs").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
          const logData = [];
          snapshot.forEach((doc) => logData.push({ ...doc.data(), docId: doc.id }));
          setLogs(logData);
        });
        
        return () => { unsubscribeStudents(); unsubscribeLogs(); };
      }, [auth.loggedIn]);

      // 🌟 修正：確保存下真實存在的學期
      useEffect(() => {
        if (students.length > 0) {
          const dbSemesters = [...new Set(students.map(s => s.semester))];
          setSemesters(prev => {
            const combined = [...new Set([...dbSemesters, ...prev])].sort().reverse();
            return combined;
          });
        }
      }, [students]);

      useEffect(() => {
        localStorage.setItem('yungNienSemesters', JSON.stringify(semesters));
      }, [semesters]);

      const currentSemesterStudents = students.filter(s => s.semester === activeSemester);
      const filteredLogs = logs.filter(l => l.semester === activeSemester).slice(0, 20);

      // === 基本功能 Handlers ===
      const handleLogin = (e) => {
        e.preventDefault();
        const account = appAccounts[loginForm.username];
        if (account && account.password === loginForm.password) {
          setAuth({ loggedIn: true, username: loginForm.username, role: account.role, name: account.name, department: account.department });
        } else {
          showAlert('身分或密碼錯誤！請確認登入資訊是否正確。', '登入失敗');
        }
      };

      const handleLogout = () => {
        setAuth({ loggedIn: false, username: '', role: '', name: '', department: '' });
      };

      const openPasswordModal = () => {
         setPasswordForm({ targetAccount: auth.username, old: '', new: '', confirm: '' });
         setIsPasswordModalOpen(true);
      };

      const handleChangePassword = (e) => {
        e.preventDefault();
        const isChangingOther = auth.role === 'admin' && passwordForm.targetAccount !== auth.username;
        const requiredOldPassword = appAccounts[auth.username].password;

        if (passwordForm.old !== requiredOldPassword) return showAlert(isChangingOther ? '您的管理員密碼驗證錯誤！' : '舊密碼錯誤！請重新輸入。', '修改失敗');
        if (passwordForm.new !== passwordForm.confirm) return showAlert('新密碼與確認密碼不一致！', '修改失敗');
        if (passwordForm.new.length < 3) return showAlert('密碼長度過短，請至少輸入3個字元。', '修改失敗');

        const updatedAccounts = {
          ...appAccounts,
          [passwordForm.targetAccount]: {
            ...appAccounts[passwordForm.targetAccount],
            password: passwordForm.new
          }
        };

        db.collection("system").doc("accounts").set(updatedAccounts).then(() => {
           setAppAccounts(updatedAccounts);
           localStorage.setItem('yungNienAccounts', JSON.stringify(updatedAccounts));
           showAlert(`已成功修改密碼！雲端同步完成。`, '修改成功');
           setIsPasswordModalOpen(false);
        }).catch(err => showAlert('雲端連線失敗：' + err.message, '錯誤'));
      };

      const addLog = (message, semester = activeSemester, department = auth.department, type = 'info') => {
        db.collection("logs").add({ semester, timestamp: new Date().toLocaleString(), message, department, timeMs: Date.now(), type });
      };

      const handleDeleteLog = (logId) => {
        if (auth.role !== 'admin') return showAlert('權限不足，只有管理員可以刪除通知紀錄！');
        if(window.confirm('確定要刪除這則通知紀錄嗎？(刪除後不可復原)')) {
            const logToDelete = logs.find(l => l.docId === logId);
            db.collection("logs").doc(logId).delete().then(() => {
               triggerUndoableAction('DELETE_LOG', logId, logToDelete, '刪除了 1 則系統通知紀錄');
            });
        }
      };

      const triggerUndoableAction = (type, docId, oldData, message) => {
        if (undoAction?.timeoutId) clearTimeout(undoAction.timeoutId);
        const timeoutId = setTimeout(() => setUndoAction(null), 15000); 
        setUndoAction({ type, docId, oldData, message, timeoutId });
      };

      const executeUndo = async () => {
        if (!undoAction) return;
        const { type, docId, oldData, timeoutId } = undoAction;
        clearTimeout(timeoutId);
        setUndoAction(null);

        try {
          if (type === 'EDIT') {
            await db.collection("students").doc(docId).update(oldData);
          } else if (type === 'DELETE') {
            await db.collection("students").doc(docId).set(oldData); 
          } else if (type === 'ADD') {
            await db.collection("students").doc(docId).delete();
          } else if (type === 'BATCH_IMPORT' || type === 'BATCH_ADD') {
             const operations = [];
             if (type === 'BATCH_ADD') {
                 oldData.forEach(ref => operations.push({ type: 'delete', ref }));
             } else {
                 oldData.added.forEach(ref => operations.push({ type: 'delete', ref }));
                 oldData.updated.forEach(item => operations.push({ type: 'update', ref: item.ref, data: item.oldData }));
             }
             for (let i = 0; i < operations.length; i += 500) {
                const chunk = operations.slice(i, i + 500);
                const batch = db.batch();
                chunk.forEach(op => {
                   if (op.type === 'delete') batch.delete(op.ref);
                   if (op.type === 'update') batch.update(op.ref, op.data);
                });
                await batch.commit();
             }
          } else if (type === 'DELETE_LOG') {
            await db.collection("logs").doc(docId).set(oldData);
          }
          showAlert('已成功復原剛才的動作！', '復原成功');
        } catch(e) {
          showAlert('復原失敗：' + e.message);
        }
      };

      const getSeatNum = (val) => parseInt(val) || 999;

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData({ ...formData, [name]: value });
      };

      const handleSaveStudent = (e) => {
        e.preventDefault();
        const actionText = editingStudent ? '修改' : '新增';
        showConfirm(`即將${actionText}學生「${formData.name}」的資料，確定執行嗎？`, () => {
          if (editingStudent) {
            db.collection("students").doc(editingStudent.docId).update({ ...formData, semester: activeSemester }).then(() => {
              let logMsg = '';
              const oldClass = `${editingStudent.grade}${editingStudent.className}班`;
              const newClass = `${formData.grade}${formData.className}班`;
              const isClassChanged = oldClass !== newClass;
              const isSeatChanged = editingStudent.seatNumber !== formData.seatNumber;
              const isStatusChanged = editingStudent.status !== formData.status;

              if (isClassChanged) {
                logMsg += `【轉班異動】學生 ${formData.name} 由原本的 ${oldClass}${editingStudent.seatNumber}號 轉入 ${newClass} (新座號: ${formData.seatNumber}號)。 `;
              } else if (isSeatChanged) {
                logMsg += `【座號異動】學生 ${formData.name} (${newClass}) 座號由 ${editingStudent.seatNumber}號 改為 ${formData.seatNumber}號。 `;
              }

              if (isStatusChanged) {
                if (['轉出', '休學', '放棄學籍', '畢業'].includes(formData.status)) {
                  logMsg += `【${formData.status}通知】學生 ${formData.name} (${newClass}) 已辦理${formData.status}。 `;
                } else if (['轉班', '轉入'].includes(formData.status) && !isClassChanged) {
                  logMsg += `【狀態變更】學生 ${formData.name} 狀態已標記為「${formData.status}」，後續請記得確認其班級。 `;
                } else if (!isClassChanged) {
                  logMsg += `【狀態變更】學生 ${formData.name} 狀態改為「${formData.status}」。 `;
                }
              }
              
              if (!logMsg && (editingStudent.name !== formData.name || editingStudent.id !== formData.id || editingStudent.gender !== formData.gender || editingStudent.originalClassSeat !== formData.originalClassSeat)) {
                 logMsg += `【資料更新】已修改學生 ${formData.name} 的基本資料。 `;
              }
              
              if (logMsg) { if (formData.transferDate) logMsg += `(生效日: ${formData.transferDate})`; addLog(logMsg, activeSemester, auth.department, 'single'); }
              setIsModalOpen(false);
              triggerUndoableAction('EDIT', editingStudent.docId, editingStudent, `修改了學生 ${formData.name} 的資料`);
            }).catch(err => showAlert("更新失敗：" + err.message));
          } else {
            db.collection("students").add({ ...formData, semester: activeSemester }).then((docRef) => {
              addLog(`【新增學生】${formData.name} 加入 ${formData.grade}${formData.className}班 (座號 ${formData.seatNumber})，狀態為「${formData.status}」${formData.transferDate ? ` (生效日: ${formData.transferDate})` : ''}`, activeSemester, auth.department, 'single');
              setIsModalOpen(false);
              triggerUndoableAction('ADD', docRef.id, null, `新增了學生 ${formData.name}`);
            }).catch(err => showAlert("新增失敗：" + err.message));
          }
        });
      };

      const handleDeleteStudent = (studentToDelete) => {
        showConfirm(`確定要徹底刪除學生「${studentToDelete.name}」嗎？`, () => {
          db.collection("students").doc(studentToDelete.docId).delete().then(() => {
            addLog(`【刪除紀錄】已移除學生「${studentToDelete.name}」。`, activeSemester, auth.department, 'single');
            setIsModalOpen(false);
            triggerUndoableAction('DELETE', studentToDelete.docId, studentToDelete, `刪除了學生 ${studentToDelete.name}`);
          });
        });
      };

      const openEditModal = (student) => { setEditingStudent(student); setFormData({ ...student }); setIsModalOpen(true); };
      const openAddModal = () => { setEditingStudent(null); setFormData({ id: '', name: '', seatNumber: '1', gender: '男', grade: manageFilterGrade, className: manageFilterClass, status: '轉入', transferDate: new Date().toISOString().split('T')[0], originalClassSeat: '' }); setIsModalOpen(true); };

      // === 學期管理 ===
      const handleCreateSemester = async (e) => {
        e.preventDefault();
        const newSem = newSemesterData.name.trim();
        if (!newSem) return showAlert('請輸入學期名稱');
        if (semesters.includes(newSem)) return showAlert('此學期名稱已存在！');

        if (newSemesterData.copyOldData) {
           const gradePromotionMap = { '國一': '國二', '國二': '國三', '國三': '畢業', '高一': '高二', '高二': '高三', '高三': '畢業' };
           let studentsToCopy = students.filter(s => s.semester === activeSemester && !['轉出', '畢業', '放棄學籍'].includes(s.status));
           const batch = db.batch(); let copyCount = 0;
           const addedDocsForUndo = [];

           studentsToCopy.forEach(s => {
             let newGrade = s.grade, newStatus = s.status, newClassName = s.className, newSeatNumber = s.seatNumber;
             if (newSemesterData.promoteGrade) {
                newGrade = gradePromotionMap[s.grade] || s.grade;
                if (newGrade === '畢業') newStatus = '畢業';
                if (newGrade !== '畢業') {
                   if (newGrade.startsWith('國') && newSemesterData.jhClassAssignment === 'unassigned') { newClassName = '未編班'; newSeatNumber = ''; }
                   if (newGrade.startsWith('高') && newSemesterData.shClassAssignment === 'unassigned') { newClassName = '未編班'; newSeatNumber = ''; }
                }
             }
             if (newStatus !== '畢業') {
                const newDocRef = db.collection("students").doc(); 
                const origInfo = `${s.grade}${s.className} ${s.seatNumber}`;
                batch.set(newDocRef, { ...s, semester: newSem, grade: newGrade, className: newClassName, seatNumber: newSeatNumber, status: newStatus, transferDate: '', originalClassSeat: origInfo });
                addedDocsForUndo.push(newDocRef);
                copyCount++;
             }
           });
           await batch.commit();
           addLog(`成功建立新學期「${newSem}」，匯入 ${copyCount} 筆學生。`, newSem, '系統', 'system');
           triggerUndoableAction('BATCH_ADD', null, addedDocsForUndo, `建立學期 ${newSem} 並匯入 ${copyCount} 筆資料`);
        } else {
           addLog(`建立空白學期「${newSem}」。`, newSem, '系統', 'system');
        }
        setSemesters(prev => [newSem, ...prev]); setActiveSemester(newSem); setIsNewSemesterModalOpen(false);
        showAlert(`新學期「${newSem}」建立完成！`, '建立成功');
      };

      const handleUpdateSemester = async (e) => {
        e.preventDefault();
        const newSem = editSemesterName.trim();
        if (!newSem) return showAlert('請輸入學期名稱');
        if (newSem === activeSemester) return setIsEditSemesterModalOpen(false);
        if (semesters.includes(newSem)) return showAlert('此學期名稱已存在！');

        showConfirm(`確定要將學期「${activeSemester}」重新命名為「${newSem}」嗎？\n系統會自動同步更新該學期底下的所有學生與通知紀錄！`, async () => {
          try {
            setIsEditSemesterModalOpen(false);
            const studentsToUpdate = students.filter(s => s.semester === activeSemester);
            const logsToUpdate = logs.filter(l => l.semester === activeSemester);
            const allDocs = [...studentsToUpdate.map(s => ({ ref: db.collection("students").doc(s.docId) })), ...logsToUpdate.map(l => ({ ref: db.collection("logs").doc(l.docId) }))];
            
            for (let i = 0; i < allDocs.length; i += 500) {
                const chunk = allDocs.slice(i, i + 500);
                const batch = db.batch();
                chunk.forEach(item => batch.update(item.ref, { semester: newSem }));
                await batch.commit();
            }

            db.collection("logs").add({ semester: newSem, timestamp: new Date().toLocaleString(), message: `【系統紀錄】管理員將學期名稱由「${activeSemester}」更改為「${newSem}」。`, department: '系統', timeMs: Date.now(), type: 'info' });

            setSemesters(prev => prev.map(s => s === activeSemester ? newSem : s));
            setActiveSemester(newSem);
            showAlert(`成功將學期重新命名為「${newSem}」！已同步 ${allDocs.length} 筆資料。`, '修改成功');
          } catch(err) {
            showAlert('學期重新命名失敗：' + err.message);
          }
        }, '重新命名確認');
      };

      // 🌟 修正：徹底解決「刪除學期後覺得資料還在」的錯覺問題
      const handleDeleteSemester = () => {
        if (semesters.length <= 1) return showAlert('無法刪除！系統至少需要保留一個學期。');

        showConfirm(`⚠️ 嚴重警告 ⚠️\n\n確定要徹底刪除【${activeSemester}】學期嗎？\n這將會同步清除該學期底下的「所有學生名單」與「通知紀錄」，且 刪除後無法復原！`, async () => {
          try {
            const semesterToDelete = activeSemester;
            const studentsToDelete = students.filter(s => s.semester === semesterToDelete);
            const logsToDelete = logs.filter(l => l.semester === semesterToDelete);
            const allDocs = [...studentsToDelete.map(s => ({ ref: db.collection("students").doc(s.docId) })), ...logsToDelete.map(l => ({ ref: db.collection("logs").doc(l.docId) }))];

            // 1. 先在前端畫面立即清空資料，提供最快的視覺回饋
            setStudents(prev => prev.filter(s => s.semester !== semesterToDelete));
            setLogs(prev => prev.filter(l => l.semester !== semesterToDelete));

            // 2. 更新學期選單並自動切換到下一個學期
            const newSemesters = semesters.filter(sem => sem !== semesterToDelete);
            setSemesters(newSemesters);
            setActiveSemester(newSemesters[0]);

            // 3. 背景執行 Firebase 雲端批次刪除
            for (let i = 0; i < allDocs.length; i += 500) {
                const chunk = allDocs.slice(i, i + 500);
                const batch = db.batch();
                chunk.forEach(item => batch.delete(item.ref));
                await batch.commit();
            }

            showAlert(`已成功徹底清除「${semesterToDelete}」的所有資料（共 ${allDocs.length} 筆）。\n\n系統已自動為您切換至「${newSemesters[0]}」學期，您現在看到的是新學期的資料表。`, '刪除成功');
          } catch (err) {
            showAlert('刪除學期失敗：' + err.message);
          }
        }, '🗑️ 刪除學期確認');
      };

      // === 🌟 Excel (.xlsx) 檔案讀取上傳與解析 ===
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            // 使用 ArrayBuffer 才能正確解析 Excel 檔案
            const data = new Uint8Array(event.target.result);
            const XLSX_Instance = window.XLSX;
            if (!XLSX_Instance) return showAlert('Excel 套件載入中，請稍後。');
            
            const workbook = XLSX_Instance.read(data, { type: 'array' });
            
            let updatedCount = 0; let addedCount = 0;
            const batch = db.batch();
            const addedDocsForUndo = [];
            const updatedDocsForUndo = [];
            let validSheetCount = 0;

            // 遍歷 Excel 所有分頁
            workbook.SheetNames.forEach(sheetName => {
              const worksheet = workbook.Sheets[sheetName];
              const rows = XLSX_Instance.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
              if (rows.length < 3) return; // 略過資料太少的分頁

              const classHeaders = [];
              rows[0].forEach((cell, index) => {
                if (typeof cell === 'string') {
                  const cleanCell = cell.replace(/\s+/g, '');
                  const match = cleanCell.match(/(國|高)(一|二|三)(忠|孝|仁|愛|信|義|和|平)/);
                  if (match) classHeaders.push({ colIndex: index, grade: match[1] + match[2], className: match[3] });
                }
              });

              if (classHeaders.length === 0) return; 
              validSheetCount++;

              for (let i = 2; i < rows.length; i++) {
                const row = rows[i];
                classHeaders.forEach(header => {
                  if (row.length > header.colIndex + 2) {
                    const seatStr = String(row[header.colIndex] || '');
                    const idStr = String(row[header.colIndex + 1] || '');
                    const nameStr = String(row[header.colIndex + 2] || '');

                    if (seatStr && nameStr && seatStr.trim() !== '' && nameStr.trim() !== '') {
                      const seatNumber = seatStr.replace('.0', '').trim();
                      let id = (idStr && idStr !== 'undefined') ? idStr.replace('.0', '').trim() : '';
                      let name = nameStr.trim();
                      let gender = name.includes('*') || name.includes('◎') ? '女' : '男';
                      name = name.replace(/[*◎]/g, '');

                      const existingStudent = students.find(s => s.semester === activeSemester && ((id && s.id === id) || (!id && s.name === name && s.grade === header.grade)));

                      if (existingStudent) {
                         const docRef = db.collection("students").doc(existingStudent.docId);
                         batch.update(docRef, { className: header.className, seatNumber: seatNumber, grade: header.grade, name: name, gender: gender });
                         updatedDocsForUndo.push({ ref: docRef, oldData: existingStudent });
                         updatedCount++;
                      } else {
                         const newDocRef = db.collection("students").doc();
                         batch.set(newDocRef, { semester: activeSemester, id: id, name: name, seatNumber: seatNumber, gender: gender, grade: header.grade, className: header.className, status: '在籍', transferDate: '', originalClassSeat: '' });
                         addedDocsForUndo.push(newDocRef);
                         addedCount++;
                      }
                    }
                  }
                });
              }
            });

            if (addedCount > 0 || updatedCount > 0) {
               showConfirm(`🎉 成功解析 Excel 檔案！\n- 共讀取了 ${validSheetCount} 個班級分頁\n- 新增了 ${addedCount} 筆新資料\n- 更新了 ${updatedCount} 筆既有資料\n\n是否確認匯入並同步至雲端「${activeSemester}」？`, async () => {
                  await batch.commit(); 
                  addLog(`批次匯入/更新 Excel 檔案：讀取 ${validSheetCount} 個分頁，新增 ${addedCount} 筆，更新 ${updatedCount} 筆資料。`, activeSemester, auth.department, 'bulk');
                  showAlert('雲端資料同步成功！', '匯入成功');
                  triggerUndoableAction('BATCH_IMPORT', null, { added: addedDocsForUndo, updated: updatedDocsForUndo }, `批次匯入 ${addedCount}筆新增，${updatedCount}筆更新`);
               });
            } else if (validSheetCount === 0) {
               showAlert('找不到班級標題 (如：高一忠)。請確認 Excel 檔案中至少有一個分頁的第一列有寫班級名稱。');
            } else {
               showAlert('未能解析出任何學生資料，請檢查 Excel 內容是否有填寫編號與姓名。');
            }
          } catch (err) {
            showAlert('解析檔案時發生錯誤：' + err.message);
          }
          setIsImportModalOpen(false);
          e.target.value = null; 
        };
        // 使用 ArrayBuffer 讀取二進位資料
        reader.readAsArrayBuffer(file);
      };

      // ==============================================================
      // 🌟 專業 Excel (.xlsx) 產生引擎 (保證有框線、標楷體、完美置中)
      // ==============================================================
      const getRocDateString = () => {
        const today = new Date();
        return `${today.getFullYear() - 1911}.${today.getMonth() + 1}.${today.getDate()}`;
      };

      const getValidMaxSeat = (studentArray) => {
        const seats = studentArray.map(s => getSeatNum(s.seatNumber)).filter(n => n !== 999 && !isNaN(n));
        return seats.length > 0 ? Math.max(...seats) : 0;
      };

      // 下載 Excel 範例檔
      const downloadSampleExcel = () => {
        const XLSX_Instance = window.XLSX;
        if (!XLSX_Instance) return showAlert('系統尚未準備好下載套件，請稍後。');
        
        let aoa = [];
        aoa.push(['高一忠', '', '', '', '', '', '高一孝', '', '', '', '', '']);
        aoa.push(['編號', '學號', '姓名', '平時', '段考', '', '編號', '學號', '姓名', '平時', '段考', '']);

      // 共用樣式設定
      const applyExcelStyle = (ws, totalCols, totalRows) => {
        const XLSX_Instance = window.XLSX;
        if (!XLSX_Instance) return;

        const borderThin = { style: "thin", color: { rgb: "000000" } };
        const borders = { top: borderThin, bottom: borderThin, left: borderThin, right: borderThin };
        
        // 定義不同的樣式
        const titleStyle = { font: { name: "標楷體", sz: 14, bold: true }, alignment: { vertical: "center", horizontal: "center" }, border: borders };
        const headerStyle = { font: { name: "標楷體", sz: 12, bold: true }, alignment: { vertical: "center", horizontal: "center" }, border: borders };
        const cellStyle = { font: { name: "標楷體", sz: 12 }, alignment: { vertical: "center", horizontal: "center" }, border: borders };
        const noBorderLeft = { font: { name: "標楷體", sz: 12 }, alignment: { vertical: "center", horizontal: "left" } };
        const noBorderRight = { font: { name: "標楷體", sz: 10 }, alignment: { vertical: "center", horizontal: "right" } };

        for (let R = 0; R < totalRows; R++) {
            for (let C = 0; C < totalCols; C++) {
                const cellRef = XLSX_Instance.utils.encode_cell({ c: C, r: R });
                if (!ws[cellRef]) ws[cellRef] = { v: "", t: "s" };
                
                // 跳過並排總表的空白分隔欄
                if (totalCols > 5 && (C + 1) % 6 === 0) continue; 

                // 套用樣式邏輯
                if (R === 0) {
                    ws[cellRef].s = titleStyle;
                } else if (R === 1) {
                    ws[cellRef].s = headerStyle;
                } else if (R === totalRows - 2) {
                    ws[cellRef].s = (C % 6 >= 3 || C >= 3 && totalCols <= 5) ? noBorderRight : noBorderLeft;
                } else if (R === totalRows - 1) {
                    ws[cellRef].s = noBorderLeft;
                } else {
                    ws[cellRef].s = cellStyle;
                }
            }
        }
      };

                const cellRef = XLSX_Instance.utils.encode_cell({ c: C, r: R });
                if (!ws[cellRef]) ws[cellRef] = { v: aoa[R][C] || "", t: "s" };
                const rowData = String(aoa[R][0] || "");
                
                if (R === 0) ws[cellRef].s = titleStyle;
                else if (R === 1) ws[cellRef].s = dateStyle; 
                else if (R === 2) ws[cellRef].s = headerStyle; 
                else if (rowData.includes('總計')) {
                    const isTotal = rowData.includes('全校') || rowData.includes('部');
                    ws[cellRef].s = isTotal ? totalStyle : subtotalStyle;
                    if (C === 0 || C === 1) ws[cellRef].s = isTotal ? totalStyle : subtotalStyle;
                } else {
                    ws[cellRef].s = baseStyle;
                }
            }
            if (String(aoa[R][0] || "").includes('總計')) ws['!merges'].push({ s: { r: R, c: 0 }, e: { r: R, c: 1 } });
        }

        const wb = XLSX_Instance.utils.book_new();
        XLSX_Instance.utils.book_append_sheet(wb, ws, '人數統計表');
        XLSX_Instance.writeFile(wb, `${activeSemester}_永年中學_班級人數統計表.xlsx`);
      };

      const GradeOptions = () => (
        <React.Fragment>
          <optgroup label="國中部"><option value="國一">國一</option><option value="國二">國二</option><option value="國三">國三</option></optgroup>
          <optgroup label="高中部"><option value="高一">高一</option><option value="高二">高二</option><option value="高三">高三</option></optgroup>
        </React.Fragment>
      );

      const ClassOptions = () => (
        <React.Fragment>
          <option value="忠">忠 班</option><option value="孝">孝 班</option><option value="仁">仁 班</option><option value="愛">愛 班</option><option value="信">信 班</option><option value="義">義 班</option><option value="和">和 班</option><option value="平">平 班</option><option value="未編班">未編班</option>
        </React.Fragment>
      );

      // === 統計數據計算 ===
      const activeSchoolStudents = currentSemesterStudents.filter(s => ['在籍', '轉班', '轉入'].includes(s.status));
      const schoolTotal = activeSchoolStudents.length;
      const schoolMale = activeSchoolStudents.filter(s => s.gender === '男').length;
      const schoolFemale = activeSchoolStudents.filter(s => s.gender === '女').length;

      const jhStudents = activeSchoolStudents.filter(s => s.grade.startsWith('國'));
      const jhTotal = jhStudents.length;
      const jhMale = jhStudents.filter(s => s.gender === '男').length;
      const jhFemale = jhStudents.filter(s => s.gender === '女').length;

      const shStudents = activeSchoolStudents.filter(s => s.grade.startsWith('高'));
      const shTotal = shStudents.length;
      const shMale = shStudents.filter(s => s.gender === '男').length;
      const shFemale = shStudents.filter(s => s.gender === '女').length;

      const activeClassListStudents = currentSemesterStudents.filter(s => s.grade === filterGrade && s.className === filterClass && ['在籍', '轉班', '轉入'].includes(s.status));
      const classListTotal = activeClassListStudents.length;
      const classListMale = activeClassListStudents.filter(s => s.gender === '男').length;
      const classListFemale = activeClassListStudents.filter(s => s.gender === '女').length;

      const activeManageListStudents = currentSemesterStudents.filter(s => s.grade === manageFilterGrade && s.className === manageFilterClass && ['在籍', '轉班', '轉入'].includes(s.status));
      const manageListTotal = activeManageListStudents.length;
      const manageListMale = activeManageListStudents.filter(s => s.gender === '男').length;
      const manageListFemale = activeManageListStudents.filter(s => s.gender === '女').length;

      return (
        <React.Fragment>
          {/* 系統共用提示對話框 */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className={`px-6 py-4 flex items-center gap-2 ${dialog.type === 'confirm' ? 'bg-amber-500' : 'bg-blue-600'}`}>
                  <i className={`fa-solid ${dialog.type === 'confirm' ? 'fa-circle-exclamation' : 'fa-circle-info'} text-white text-lg`}></i>
                  <h3 className="text-white font-bold text-lg">{dialog.title}</h3>
                </div>
                <div className="p-6 text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">{dialog.message}</div>
                <div className="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-200">
                  {dialog.type === 'confirm' && <button onClick={closeDialog} className="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg font-bold transition-colors">取消</button>}
                  <button onClick={() => { if (dialog.onConfirm) dialog.onConfirm(); closeDialog(); }} className={`px-4 py-2 text-white rounded-lg font-bold shadow-md transition-colors ${dialog.type === 'confirm' ? 'bg-amber-600 hover:bg-amber-700' : 'bg-blue-600 hover:bg-blue-700'}`}>確定</button>
                </div>
              </div>
            </div>
          )}

          {/* 修改密碼 Modal */}
          {isPasswordModalOpen && auth.role === 'admin' && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="bg-slate-800 px-6 py-4 flex items-center gap-2">
                  <i className="fa-solid fa-key text-white text-lg"></i>
                  <h3 className="text-white font-bold text-lg">修改登入密碼</h3>
                </div>
                <form onSubmit={handleChangePassword} className="p-6 space-y-4">
                  <div className="space-y-1">
                    <label className="text-sm font-medium text-slate-700">選擇修改的帳號</label>
                    <select value={passwordForm.targetAccount} onChange={e => setPasswordForm({...passwordForm, targetAccount: e.target.value})} className="w-full border rounded-lg px-3 py-2 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-blue-700 transition-shadow">
                      <option value="admin">教務處 (管理員)</option>
                      <option value="academic">教務處 (一般行政)</option>
                      <option value="studentAffairs">學務處 (一般行政)</option>
                      <option value="counseling">輔導室 (一般行政)</option>
                      <option value="generalAffairs">總務處 (一般行政)</option>
                    </select>
                  </div>
                  <div className="space-y-1">
                    <label className="text-sm font-medium text-slate-700">舊密碼 (驗證用)</label>
                    <input required type="password" value={passwordForm.old} onChange={e => setPasswordForm({...passwordForm, old: e.target.value})} className="w-full border rounded-lg px-3 py-2 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="請輸入您目前的管理員密碼" />
                  </div>
                  <div className="space-y-1">
                    <label className="text-sm font-medium text-slate-700">新密碼</label>
                    <input required type="password" value={passwordForm.new} onChange={e => setPasswordForm({...passwordForm, new: e.target.value})} className="w-full border rounded-lg px-3 py-2 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="請設定新密碼" />
                  </div>
                  <div className="space-y-1">
                    <label className="text-sm font-medium text-slate-700">確認新密碼</label>
                    <input required type="password" value={passwordForm.confirm} onChange={e => setPasswordForm({...passwordForm, confirm: e.target.value})} className="w-full border rounded-lg px-3 py-2 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="請再次輸入新密碼" />
                  </div>
                  <div className="pt-4 flex justify-end gap-3 border-t mt-6">
                    <button type="button" onClick={() => setIsPasswordModalOpen(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">取消</button>
                    <button type="submit" className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-colors">確認修改</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* === 登入畫面 === */}
          {!auth.loggedIn && (
            <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
              <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-300">
                <div className="bg-blue-600 p-8 text-center relative overflow-hidden">
                  <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm relative z-10">
                    <i className="fa-solid fa-users text-3xl text-white"></i>
                  </div>
                  <h1 className="text-2xl font-bold text-white mb-2 relative z-10">永年中學 學籍管理系統</h1>
                  <p className="text-blue-100 text-sm relative z-10 flex items-center justify-center gap-1">雲端資料庫連線版</p>
                </div>
                <form onSubmit={handleLogin} className="p-8 space-y-6">
                  <div className="space-y-2">
                    <label className="text-sm font-semibold text-slate-700">登入身分</label>
                    <select value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-3 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition-shadow">
                      <option value="admin">教務處 (管理員)</option>
                      <option value="academic">教務處 (一般行政)</option>
                      <option value="studentAffairs">學務處 (一般行政)</option>
                      <option value="counseling">輔導室 (一般行政)</option>
                      <option value="generalAffairs">總務處 (一般行政)</option>
                    </select>
                  </div>
                  <div className="space-y-2">
                    <label className="text-sm font-semibold text-slate-700">登入密碼</label>
                    <input type="password" required value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-3 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="請輸入密碼" />
                  </div>
                  <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md flex justify-center items-center gap-2 transition-colors">
                    <i className="fa-solid fa-lock text-lg"></i> 登入系統
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* === 主系統畫面 === */}
          {auth.loggedIn && (
            <div className="flex bg-[#f8fafc] min-h-screen font-sans w-full">
              {/* 側邊欄 */}
              <div className="w-64 bg-[#1e293b] text-white min-h-screen flex flex-col shadow-xl z-10 flex-shrink-0">
                <div className="p-6 border-b border-slate-700/50">
                  <h1 className="text-xl font-bold mb-2 flex items-center gap-2"><i className="fa-solid fa-users text-xl text-blue-400"></i> 永年中學系統</h1>
                  <div className="text-xs text-slate-300 pb-4 flex flex-col gap-2">
                    <span>目前登入：{auth.name}</span>
                    <span className={`inline-block px-2 py-1 rounded text-white text-center shadow-sm ${auth.role === 'admin' ? 'bg-emerald-600' : 'bg-slate-600'}`}>權限：{auth.role === 'admin' ? '管理員 (可修改)' : '一般行政 (讀取)'}</span>
                  </div>
                </div>
                
                <div className="px-5 py-5 border-b border-slate-700/50">
                  <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2"><i className="fa-solid fa-calendar-days"></i> 當前作業學期</label>
                  <div className="flex gap-1 items-center">
                    <select value={activeSemester} onChange={(e) => setActiveSemester(e.target.value)} className="flex-1 bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 outline-none focus:border-blue-500 font-medium transition-shadow">
                      {semesters.map(sem => <option key={sem} value={sem}>{sem} 學期</option>)}
                    </select>
                    {auth.role === 'admin' && (
                      <React.Fragment>
                        <button onClick={() => { setEditSemesterName(activeSemester); setIsEditSemesterModalOpen(true); }} className="p-2 bg-slate-700 hover:bg-amber-500 rounded-lg text-slate-300 hover:text-white transition-colors border border-slate-600" title="編輯學期"><i className="fa-solid fa-pen text-xs"></i></button>
                        <button onClick={() => setIsNewSemesterModalOpen(true)} className="p-2 bg-slate-700 hover:bg-blue-600 rounded-lg text-slate-300 hover:text-white transition-colors border border-slate-600" title="新增學期"><i className="fa-solid fa-plus text-xs"></i></button>
                        <button onClick={handleDeleteSemester} className="p-2 bg-slate-700 hover:bg-red-600 rounded-lg text-slate-300 hover:text-white transition-colors border border-slate-600" title="刪除學期"><i className="fa-solid fa-trash-can text-xs"></i></button>
                      </React.Fragment>
                    )}
                  </div>
                </div>
                
                <nav className="space-y-1 flex-1 py-4">
                  <button onClick={() => setActiveTab('classList')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors border-l-4 ${activeTab === 'classList' ? 'bg-blue-600/20 text-blue-400 border-blue-500' : 'border-transparent hover:bg-slate-800 text-slate-300 hover:text-white'}`}>
                    <i className="fa-solid fa-file-excel text-lg text-center w-5"></i> 名單下載產出
                  </button>
                  {auth.role === 'admin' && (
                    <button onClick={() => setActiveTab('manage')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors border-l-4 ${activeTab === 'manage' ? 'bg-blue-600/20 text-blue-400 border-blue-500' : 'border-transparent hover:bg-slate-800 text-slate-300 hover:text-white'}`}>
                      <i className="fa-solid fa-pen-to-square text-lg text-center w-5"></i> 學籍異動管理
                    </button>
                  )}
                  <button onClick={() => setActiveTab('notifications')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors border-l-4 ${activeTab === 'notifications' ? 'bg-blue-600/20 text-blue-400 border-blue-500' : 'border-transparent hover:bg-slate-800 text-slate-300 hover:text-white'}`}>
                    <i className="fa-solid fa-bell text-lg text-center w-5"></i> 處室通知紀錄
                    {filteredLogs.length > 0 && <span className="ml-auto bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">{filteredLogs.length}</span>}
                  </button>
                </nav>
                
                <div className="p-4 border-t border-slate-700/50 space-y-2">
                  {auth.role === 'admin' && <button onClick={openPasswordModal} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-2.5 rounded-lg transition-colors font-medium"><i className="fa-solid fa-key"></i> 管理密碼</button>}
                  <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-2.5 rounded-lg transition-colors font-medium"><i className="fa-solid fa-right-from-bracket"></i> 登出系統</button>
                </div>
              </div>
              
              <main className="flex-1 p-6 lg:p-8 overflow-y-auto h-screen relative">
                {/* 同步中提示 */}
                {!isDataLoaded && (
                  <div className="absolute inset-0 bg-slate-50/80 backdrop-blur-sm flex flex-col items-center justify-center z-20">
                     <i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-4"></i>
                     <p className="text-slate-600 font-bold">雲端資料庫連線同步中...</p>
                  </div>
                )}

                {/* 復原提示框 */}
                {undoAction && (
                  <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-4 z-[200] animate-in slide-in-from-bottom-5">
                     <div>
                       <p className="font-bold text-sm">剛才的操作已暫存</p>
                       <p className="text-xs text-slate-300">{undoAction.message}</p>
                     </div>
                     <button onClick={executeUndo} className="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">
                       <i className="fa-solid fa-rotate-left"></i> 復原操作
                     </button>
                     <button onClick={() => { clearTimeout(undoAction.timeoutId); setUndoAction(null); }} className="text-slate-400 hover:text-white ml-2 transition-colors">
                       <i className="fa-solid fa-xmark"></i>
                     </button>
                  </div>
                )}

                {/* === 🌟 頂部人數統計卡片 === */}
                {(activeTab === 'classList' || activeTab === 'manage') && (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 max-w-6xl mx-auto">
                    <div className="bg-white rounded-xl shadow-sm border border-emerald-100 p-6 flex flex-col items-center justify-center relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-emerald-400"></div>
                      <span className="font-bold text-emerald-600 flex items-center gap-2 mb-2 text-lg"><i className="fa-solid fa-school"></i> 全校總計</span>
                      <div className="text-4xl font-black text-emerald-500 mb-3">{schoolTotal} <span className="text-base font-bold text-slate-500">人</span></div>
                      <div className="bg-slate-50 border border-slate-100 text-slate-500 text-xs font-bold px-4 py-1.5 rounded-full shadow-sm">男 {schoolMale} / 女 {schoolFemale}</div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-blue-100 p-6 flex flex-col items-center justify-center relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-blue-400"></div>
                      <span className="font-bold text-blue-600 flex items-center gap-2 mb-2 text-lg"><i className="fa-solid fa-users"></i> 國中部</span>
                      <div className="text-4xl font-black text-blue-500 mb-3">{jhTotal} <span className="text-base font-bold text-slate-500">人</span></div>
                      <div className="bg-slate-50 border border-slate-100 text-slate-500 text-xs font-bold px-4 py-1.5 rounded-full shadow-sm">男 {jhMale} / 女 {jhFemale}</div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-purple-100 p-6 flex flex-col items-center justify-center relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-purple-400"></div>
                      <span className="font-bold text-purple-600 flex items-center gap-2 mb-2 text-lg"><i className="fa-solid fa-user-graduate"></i> 高中部</span>
                      <div className="text-4xl font-black text-purple-500 mb-3">{shTotal} <span className="text-base font-bold text-slate-500">人</span></div>
                      <div className="bg-slate-50 border border-slate-100 text-slate-500 text-xs font-bold px-4 py-1.5 rounded-full shadow-sm">男 {shMale} / 女 {shFemale}</div>
                    </div>
                  </div>
                )}

                {/* === 名單下載產出 Tab === */}
                {activeTab === 'classList' && (
                  <div className="max-w-6xl mx-auto space-y-6">
                    <div className="bg-indigo-50 p-5 rounded-xl shadow-sm border border-indigo-100 flex flex-col xl:flex-row items-center justify-between gap-4">
                      <h3 className="text-base font-bold text-indigo-900 flex items-center gap-2 pl-2">
                        <i className="fa-solid fa-download text-lg text-indigo-700"></i> 【{activeSemester}】名單批次產出 (Excel 完美排版)
                      </h3>
                      <div className="flex flex-wrap gap-2 items-center">
                        <button onClick={() => exportGradeToExcel('國一')} className="bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-600 transition-colors text-sm shadow-sm">國一</button>
                        <button onClick={() => exportGradeToExcel('國二')} className="bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-600 transition-colors text-sm shadow-sm">國二</button>
                        <button onClick={() => exportGradeToExcel('國三')} className="bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-600 transition-colors text-sm shadow-sm">國三</button>
                        <div className="w-px h-6 bg-indigo-200 mx-1"></div>
                        <button onClick={() => exportGradeToExcel('高一')} className="bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-600 transition-colors text-sm shadow-sm">高一</button>
                        <button onClick={() => exportGradeToExcel('高二')} className="bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-600 transition-colors text-sm shadow-sm">高二</button>
                        <button onClick={() => exportGradeToExcel('高三')} className="bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-600 transition-colors text-sm shadow-sm">高三</button>
                        <div className="w-px h-8 bg-indigo-200 mx-2 hidden xl:block"></div>
                        <button onClick={exportWholeSchoolToExcel} className="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-teal-700 shadow-sm transition-colors">
                          <i className="fa-solid fa-file-excel"></i> 全校總表
                        </button>
                        <button onClick={exportStudentCountsToExcel} className="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-amber-600 shadow-sm transition-colors">
                          <i className="fa-solid fa-chart-pie"></i> 匯出人數統計

                          <h2 className="text-xl font-bold text-slate-800">單班線上檢視</h2>

                          <select className="border border-slate-300 rounded-md px-3 py-1.5 bg-white outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700 text-sm transition-shadow" value={filterClass} onChange={(e) => setFilterClass(e.target.value)}><ClassOptions /></select>
                        </div>
                        <button onClick={() => exportClassToExcel(filterGrade, filterClass)} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium text-sm shadow-sm flex items-center gap-2 transition-colors ml-auto sm:ml-0">
