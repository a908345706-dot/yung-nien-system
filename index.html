                              <th className="py-4 px-5 font-bold w-24 text-blue-700">座號</th>
                              <th className="py-4 px-5 font-bold">學號</th>
                              <th className="py-4 px-5 font-bold">姓名</th>
                              <th className="py-4 px-5 font-bold w-24">性別</th>
                              <th className="py-4 px-5 font-bold">狀態</th>
                              <th className="py-4 px-5 font-bold text-slate-500">異動日期</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 text-base">
                            {students.filter(s => s.semester === activeSemester && s.grade === filterGrade && s.className === filterClass).sort((a,b) => getSeatNum(a.seatNumber) - getSeatNum(b.seatNumber)).map(student => (
                              <tr key={student.docId} className="hover:bg-blue-50/50 transition-colors">
                                <td className="py-4 px-5 font-bold text-blue-700 text-xl">{student.seatNumber}</td>
                                <td className="py-4 px-5 text-slate-600 font-mono text-lg">{['轉出', '畢業', '放棄學籍'].includes(student.status) ? '-' : (student.id || '無學號')}</td>
                                <td className="py-4 px-5 font-bold text-slate-800 text-lg">{['轉出', '畢業', '放棄學籍'].includes(student.status) ? '-' : student.name} {student.gender === '女' && !['轉出', '畢業', '放棄學籍'].includes(student.status) && <span className="text-pink-500 font-bold ml-1">*</span>}</td>
                                <td className="py-4 px-5 text-slate-600 text-lg">{student.gender}</td>
                                <td className="py-4 px-5">
                                  <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold border ${
                                    student.status === '在籍' ? 'bg-green-50 text-green-700 border-green-200' :
                                    student.status === '轉入' ? 'bg-blue-50 text-blue-700 border-blue-200' : 
                                    student.status === '轉班' ? 'bg-purple-50 text-purple-700 border-purple-200' : 
                                    student.status === '休學' ? 'bg-amber-50 text-amber-700 border-amber-200' : 
                                    student.status === '放棄學籍' ? 'bg-slate-100 text-slate-600 border-slate-300' : 
                                    'bg-red-50 text-red-700 border-red-200'
                                  }`}>{student.status}</span>
                                </td>
                                <td className="py-4 px-5 text-slate-500 text-sm">{student.transferDate || '-'}</td>
                              </tr>
                            ))}
                            {students.filter(s => s.semester === activeSemester && s.grade === filterGrade && s.className === filterClass).length === 0 && (
                              <tr><td colSpan="6" className="py-10 text-center text-slate-400 font-medium">此班級目前沒有學生資料</td></tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* === 學籍異動管理 Tab === */}
                {activeTab === 'manage' && auth.role === 'admin' && (
                  <div className="max-w-6xl mx-auto space-y-6">
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-5">
                      <div className="flex flex-wrap items-center gap-3">
                        <select className="border border-slate-300 rounded-lg px-3 py-2 bg-white outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700 text-sm transition-shadow" value={manageFilterGrade} onChange={(e) => setManageFilterGrade(e.target.value)}><GradeOptions /></select>
                        <select className="border border-slate-300 rounded-lg px-3 py-2 bg-white outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700 text-sm transition-shadow" value={manageFilterClass} onChange={(e) => setManageFilterClass(e.target.value)}><ClassOptions /></select>
                        <span className="bg-emerald-50 border border-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-xs font-bold shadow-sm whitespace-nowrap">班級人數：{manageListTotal} 人 (男 {manageListMale} / 女 {manageListFemale})</span>
                        <div className="relative ml-auto xl:ml-2 w-full xl:w-64">
                          <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                          <input type="text" placeholder="班內搜尋..." className="pl-9 pr-3 py-2 border border-slate-300 rounded-lg w-full outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-slate-50 transition-shadow" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                        </div>
                      </div>
                      
                      {/* 🌟 匯出與管理操作列 (全 Excel 引擎) */}
                      <div className="flex flex-wrap justify-between items-center gap-4 pt-4 border-t border-slate-100">
                        <div className="flex flex-wrap gap-2">
                          <button onClick={exportWholeSchoolToExcel} className="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-teal-700 shadow-sm transition-colors"><i className="fa-solid fa-file-excel"></i> 匯出全校總表</button>
                          <button onClick={() => exportClassToExcel(manageFilterGrade, manageFilterClass)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-blue-700 shadow-sm transition-colors"><i className="fa-solid fa-download"></i> 匯出此班級名單</button>
                          <button onClick={exportStudentCountsToExcel} className="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-amber-600 shadow-sm transition-colors"><i className="fa-solid fa-chart-pie"></i> 匯出人數統計</button>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={() => setIsImportModalOpen(true)} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors"><i className="fa-solid fa-upload"></i> 匯入/更新 Excel</button>
                          <button onClick={openAddModal} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors"><i className="fa-solid fa-user-plus"></i> 新增轉入</button>
                        </div>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse min-w-max">
                          <thead>
                            <tr className="bg-slate-50 border-b-2 border-slate-200 text-slate-600 text-base">
                              <th className="py-4 px-5 font-bold w-24">班級</th>
                              <th className="py-4 px-5 font-bold text-blue-700 w-20">座號</th>
                              <th className="py-4 px-5 font-bold">學號</th>
                              <th className="py-4 px-5 font-bold">姓名</th>
                              <th className="py-4 px-5 font-bold">狀態</th>
                              <th className="py-4 px-5 font-bold text-slate-500">異動紀錄 (日期)</th>
                              <th className="py-4 px-5 font-bold text-right">操作</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 text-base">
                            {students.filter(s => s.semester === activeSemester && s.grade === manageFilterGrade && s.className === manageFilterClass).filter(s => s.name.includes(searchTerm) || (s.id && s.id.includes(searchTerm))).sort((a,b) => getSeatNum(a.seatNumber) - getSeatNum(b.seatNumber)).map(student => (
                              <tr key={student.docId} className="hover:bg-blue-50/50 transition-colors">
                                <td className="py-4 px-5 font-medium text-slate-600 text-lg">{student.grade}{student.className}</td>
                                <td className="py-4 px-5 font-bold text-blue-700 text-xl">{student.seatNumber}</td>
                                <td className="py-4 px-5 font-mono text-slate-700 text-lg">{student.id || '-'}</td>
                                <td className="py-4 px-5 font-bold text-slate-800 text-lg">{student.name} {student.gender === '女' && <span className="text-pink-500">*</span>}</td>
                                <td className="py-4 px-5">
                                  <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold border ${
                                    student.status === '在籍' ? 'bg-green-50 text-green-700 border-green-200' :
                                    student.status === '轉入' ? 'bg-blue-50 text-blue-700 border-blue-200' : 
                                    student.status === '轉班' ? 'bg-purple-50 text-purple-700 border-purple-200' : 
                                    student.status === '休學' ? 'bg-amber-50 text-amber-700 border-amber-200' : 
                                    student.status === '放棄學籍' ? 'bg-slate-100 text-slate-600 border-slate-300' : 
                                    'bg-red-50 text-red-700 border-red-200'
                                  }`}>{student.status}</span>
                                </td>
                                <td className="py-4 px-5 text-slate-500 text-sm">{student.transferDate || '-'}</td>
                                <td className="py-4 px-5 text-right">
                                  <button onClick={() => openEditModal(student)} className="text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-lg transition-colors text-sm font-bold inline-flex items-center gap-1"><i className="fa-solid fa-pen-to-square"></i> 編輯</button>
                                </td>
                              </tr>
                            ))}
                            {students.filter(s => s.semester === activeSemester && s.grade === manageFilterGrade && s.className === manageFilterClass).length === 0 && (
                              <tr><td colSpan="7" className="py-10 text-center text-slate-400 font-medium text-lg">此班級目前沒有符合的學生資料</td></tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* === 處室通知紀錄 === */}
                {activeTab === 'notifications' && (
                  <div className="max-w-4xl mx-auto space-y-6 pb-12">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                      <div className="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-clock-rotate-left text-xl text-blue-600"></i> 【{activeSemester}】系統異動紀錄</h2>
                        <span className="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full shadow-sm">共 {filteredLogs.length} 筆</span>
                      </div>
                      <div className="space-y-4">
                        {filteredLogs.map((log, index) => {
                          const isSingle = log.type === 'single';
                          return (
                            <div key={log.docId || log.id || index} className={`relative group flex items-start gap-4 p-4 border rounded-lg transition-colors ${isSingle ? 'bg-amber-50 border-amber-200 shadow-sm' : 'bg-slate-50 border-slate-200'}`}>
                              <div className={`p-2 rounded-full mt-1 ${isSingle ? 'bg-amber-100 text-amber-600' : 'bg-blue-100 text-blue-600'}`}>
                                <i className={`fa-solid ${isSingle ? 'fa-user-pen' : 'fa-bell'} text-lg`}></i>
                              </div>
                              <div className="flex-1 pr-8">
                                <div className="flex items-center gap-2 mb-1">
                                  <span className={`font-bold ${isSingle ? 'text-amber-800' : 'text-slate-800'}`}>{log.department} 通報</span>
                                  <span className="text-xs text-slate-400 font-normal">{log.timestamp}</span>
                                </div>
                                <p className={isSingle ? 'text-amber-900 font-medium' : 'text-slate-700'}>{log.message}</p>
                              </div>
                              {auth.role === 'admin' && <button onClick={() => handleDeleteLog(log.docId || log.id)} className="absolute right-4 top-4 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded transition-colors opacity-0 group-hover:opacity-100"><i className="fa-solid fa-trash-can text-lg"></i></button>}
                            </div>
                          );
                        })}
                        {filteredLogs.length === 0 && (
                          <div className="text-center p-10 text-slate-400 border-2 border-dashed border-slate-200 rounded-xl font-medium">目前沒有任何異動通知紀錄</div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </main>

              {/* 新增/編輯學生 Modal */}
              {isModalOpen && auth.role === 'admin' && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4 transition-opacity">
                  <div className="bg-white rounded-2xl w-full max-w-[480px] shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="bg-[#1e293b] px-6 py-4 flex justify-between items-center">
                      <h3 className="text-white font-bold text-lg flex items-center gap-3">
                        <i className={`fa-solid ${editingStudent ? 'fa-arrow-right-arrow-left' : 'fa-user-plus'} text-slate-300`}></i>
                        {editingStudent ? '編輯學生 / 異動' : '新增學生 (轉入)'}
                      </h3>
                    </div>
                    <form onSubmit={handleSaveStudent} className="p-6">
                      <div className="grid grid-cols-2 gap-5 mb-5">
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[13px] font-medium text-slate-600">學號</label>
                          <input type="text" name="id" value={formData.id} onChange={handleInputChange} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm transition-all" />
                        </div>
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[13px] font-medium text-slate-600">姓名</label>
                          <input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm transition-all" />
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-5 mb-6">
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[13px] font-medium text-slate-600">性別</label>
                          <select name="gender" value={formData.gender} onChange={handleInputChange} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm bg-white cursor-pointer transition-all">
                            <option value="男">男</option>
                            <option value="女">女</option>
                          </select>
                        </div>
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[13px] font-medium text-slate-600">異動生效日期</label>
                          <input type="date" name="transferDate" value={formData.transferDate || ''} onChange={handleInputChange} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm text-slate-700 bg-white transition-all" />
                        </div>
                      </div>
                      
                      <div className="flex flex-col gap-1.5 mb-6">
                        <label className="text-[13px] font-medium text-slate-600">學籍狀態</label>
                        <select name="status" value={formData.status} onChange={handleInputChange} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm bg-white cursor-pointer font-bold text-blue-700 transition-all">
                          <option value="在籍">在籍 (一般)</option>
                          <option value="轉入">轉入 (外校轉入)</option>
                          <option value="轉班">轉班 (校內異動)</option>
                          <option value="休學">休學</option>
                          <option value="放棄學籍">放棄學籍</option>
                          <option value="轉出">轉出</option>
                          <option value="畢業">畢業</option>
                        </select>
                      </div>

                      <div className="bg-blue-50/50 border border-blue-200 rounded-xl p-5 mb-8">
                        <div className="flex items-center gap-1.5 text-blue-700 mb-4">
                          <i className="fa-solid fa-circle-info text-xs"></i>
                          <span className="text-[13px] font-bold">班級與座號設定</span>
                        </div>
                        <div className="grid grid-cols-3 gap-3">
                          <div className="flex flex-col gap-1.5">
                            <label className="text-[13px] font-medium text-blue-600">年級</label>
                            <select name="grade" value={formData.grade} onChange={handleInputChange} className="w-full border border-blue-200 rounded-lg px-2.5 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm bg-white cursor-pointer transition-all"><GradeOptions/></select>
                          </div>
                          <div className="flex flex-col gap-1.5">
                            <label className="text-[13px] font-medium text-blue-600">新班級</label>
                            <select name="className" value={formData.className} onChange={handleInputChange} className="w-full border border-blue-200 rounded-lg px-2.5 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm bg-white cursor-pointer transition-all"><ClassOptions/></select>
                          </div>
                          <div className="flex flex-col gap-1.5">
                            <label className="text-[13px] font-medium text-blue-600">新座號</label>
                            <input type="text" name="seatNumber" value={formData.seatNumber} onChange={handleInputChange} className="w-full border border-blue-200 rounded-lg px-2.5 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-sm bg-white transition-all" />
                          </div>
                        </div>
                      </div>

                      <div className="flex justify-between gap-3 pt-4 border-t border-slate-100">
                        <div>
                          {editingStudent && <button type="button" onClick={() => handleDeleteStudent(editingStudent)} className="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg text-sm font-bold transition-colors flex items-center gap-1"><i className="fa-solid fa-trash-can"></i> 刪除</button>}
                        </div>
                        <div className="flex gap-3">
                          <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-colors">取消</button>
                          <button type="submit" className="px-6 py-2 bg-[#2563eb] text-white rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition-colors flex items-center gap-2"><i className="fa-solid fa-circle-check"></i> 確定儲存</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* 重新命名學期 Modal */}
              {isEditSemesterModalOpen && auth.role === 'admin' && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                  <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="bg-amber-600 px-6 py-4 flex items-center gap-2"><i className="fa-solid fa-pen text-white"></i><h3 className="text-white font-bold">重新命名學期</h3></div>
                    <form onSubmit={handleUpdateSemester} className="p-6 space-y-4">
                      <div>
                        <label className="text-sm font-medium text-slate-700">新學期名稱</label>
                        <input required type="text" value={editSemesterName} onChange={e => setEditSemesterName(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition-shadow mt-1" />
                      </div>
                      <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onClick={() => setIsEditSemesterModalOpen(false)} className="px-5 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-6 py-2 bg-amber-600 text-white rounded-lg font-bold shadow-md hover:bg-amber-700 transition-colors">儲存</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* 建立新學期 Modal */}
              {isNewSemesterModalOpen && auth.role === 'admin' && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                  <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="bg-indigo-600 px-6 py-4 flex items-center gap-2"><i className="fa-solid fa-calendar-days text-white"></i><h3 className="text-white font-bold">建立新學期</h3></div>
                    <form onSubmit={handleCreateSemester} className="p-6 space-y-5">
                      <div>
                        <label className="text-sm font-medium text-slate-700">新學期名稱</label>
                        <input required type="text" value={newSemesterData.name} onChange={e => setNewSemesterData({...newSemesterData, name: e.target.value})} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-shadow mt-1" placeholder="例: 115-1" />
                      </div>
                      <div className="flex items-start gap-3 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <input type="checkbox" checked={newSemesterData.copyOldData} onChange={() => setNewSemesterData({...newSemesterData, copyOldData: !newSemesterData.copyOldData})} className="mt-1 cursor-pointer w-4 h-4 text-indigo-600" />
                        <div>
                          <label className="text-sm font-bold text-indigo-900 cursor-pointer">自動匯入舊資料</label>
                          <p className="text-xs text-indigo-700 mt-1">系統會將目前學期在籍的學生自動複製至新學期。</p>
                        </div>
                      </div>
                      <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onClick={() => setIsNewSemesterModalOpen(false)} className="px-5 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">取消</button>
                        <button type="submit" className="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold shadow-md hover:bg-indigo-700 transition-colors">建立</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* 匯入 Excel Modal */}
              {isImportModalOpen && auth.role === 'admin' && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                  <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="bg-emerald-600 px-6 py-4 flex items-center gap-2"><i className="fa-solid fa-upload text-white"></i><h3 className="text-white font-bold">匯入/更新 Excel 名單</h3></div>
                    <div className="p-6 space-y-4">
                      <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-4 text-sm text-emerald-800 flex flex-col gap-2">
                        <p>請將檔案存成 <strong>Excel 格式 (.xlsx)</strong> 後上傳。</p>
                        <button onClick={downloadSampleExcel} className="text-emerald-700 font-bold underline text-left hover:text-emerald-900 transition-colors">點此下載匯入 Excel 範例檔</button>
                      </div>
                      <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} className="w-full text-sm text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer" />
                      <div className="flex justify-end gap-3 pt-4 border-t border-slate-100 mt-6">
                        <button type="button" onClick={() => setIsImportModalOpen(false)} className="px-5 py-2 bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-lg font-bold transition-colors">關閉視窗</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
